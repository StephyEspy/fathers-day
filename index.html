<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Happy Father's Day</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="crt-overlay" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="laser-field" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <main class="page">
      <section class="hero" aria-labelledby="page-title">
        <div class="cabinet">
          <div class="marquee">
            <span class="marquee-light red"></span>
            <p class="eyebrow">Galactic Dad Command</p>
            <span class="marquee-light blue"></span>
          </div>

          <div class="screen">
            <div class="pkg-band top" aria-hidden="true"></div>
            <div class="pkg-band bottom" aria-hidden="true"></div>
            <div class="armor left" aria-hidden="true"></div>
            <div class="armor right" aria-hidden="true"></div>
            <div class="horizon" aria-hidden="true"></div>
            <div class="grid-floor" aria-hidden="true"></div>

            <div class="hero-content">
              <span class="hud-label">COLLECTOR'S SERIES &middot; 1985 EDITION</span>
              <h1 id="page-title" aria-label="Happy Father’s Day">
                <span data-text="Happy">Happy</span>
                <span data-text="Father’s">Father’s</span>
                <span data-text="Day">Day</span>
              </h1>
              <p class="message">
                MORE THAN MEETS THE EYE &mdash; thank you for every lesson,
                every launch, and every rescue mission.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

</html>
